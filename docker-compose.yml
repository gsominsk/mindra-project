services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mindra-website
    restart: unless-stopped
    ports:
      - "80:3000"
    volumes:
      # Mount server media directory to /app/public/media inside container
      - /root/media:/app/public/media:ro
      - uploads-data:/app/public/uploads
      - sqlite-data:/app/prisma
      - party-logs:/app/logs/party_prompts
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_MEDIA_URL=/media
    env_file:
      - .env
    networks:
      - mindra-network

  ig-sync:
    build:
      context: ./scripts/instagram_sync
      dockerfile: Dockerfile
    container_name: mindra-ig-sync
    volumes:
      - uploads-data:/uploads
      - sync-state:/app/state
      - sync-logs:/app/logs
    environment:
      - CMS_BASE_URL=http://app:3000
      - IG_TARGET_PROFILE=${IG_TARGET_PROFILE}
    depends_on:
      - app
    command: ["python", "-m", "entrypoint", "--mode", "daily", "--profile", "${IG_TARGET_PROFILE}"]
    profiles:
      - sync
    networks:
      - mindra-network

networks:
  mindra-network:
    driver: bridge

volumes:
  uploads-data:
  sqlite-data:
  sync-state:
  sync-logs:
  party-logs:

