# Production compose for DigitalOcean droplet (512MB RAM, no build, no ig-sync)
# Uses prebuilt image mindra-website:prod (loaded via docker load).
services:
  app:
    image: mindra-website:prod
    container_name: mindra-website
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - uploads-data:/app/public/uploads
      - sqlite-data:/app/prisma
      - party-logs:/app/logs/party_prompts
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_MEDIA_URL=/media
      - DATABASE_URL=file:/app/prisma/dev.db
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - mindra-network

networks:
  mindra-network:
    driver: bridge

volumes:
  uploads-data:
  sqlite-data:
  party-logs:
